<!DOCTYPE html>
<html>
<head>
  <title>Carrinho</title>
  <link rel="stylesheet" href="assets/CSS/carrinho.css">
  <link rel="stylesheet" href="assets/CSS/styles.css">
  <script type="text/javascript" src="assets/JS/scripts.js" async></script>
<script type="text/javascript" src="assets/JS/carrinho.js" async></script>
<link rel="Website Icon" type="png" href="img/LOGO.png">
</head>
<body>
  <nav>
    <a href="produtos.html"><div class="logo">SHOPPRIME</div></a>
  </nav>
  <main>
    <div class="titulodapagina">Seu Carrinho</div>
    <div class="conteudo">
      <section>
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Preço</th>
              <th>Quantidade</th>
              <th>Total</th>
              <th>Remover</th>
            </tr>
          </thead>
          <tbody id="lista-carrinho">
          </tbody>
        </table>
      </section>
      <aside>
        <div class="testeserio">
          <header>Valor da compra</header>
          <footer>
            <span>Total</span>
            <span id="total"></span>
          </footer>
        </div>
        <button id="submit-compra">Finalizar Compra</button>
      </aside>
    </div>
  </main>
</body>
</html>
